<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#c68a3f">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icons/icon-192.png">
<link rel="apple-touch-icon" href="assets/icons/icon-192.png">
<title>Board Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app" id="app">
  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn" id="btnInfo" aria-label="Info"></button>
    <div class="logo"><img src="assets/logo.png" alt=""> Board Puzzle</div>
    <button class="icon-btn" id="btnTheme" aria-label="Theme"></button>
  </header>

  <!-- Style selector (Number / Photo) -->
  <div class="selector" id="styleSel">
    <button class="arrow" data-dir="-1" aria-label="Previous"></button>
    <div class="val" id="styleVal">Number</div>
    <button class="arrow" data-dir="1" aria-label="Next"></button>
  </div>

  <!-- Mode / Preset selector -->
  <div class="selector" id="modeSel">
    <button class="arrow" data-dir="-1" aria-label="Previous"></button>
    <div class="val" id="modeVal">Classic</div>
    <button class="arrow" data-dir="1" aria-label="Next"></button>
  </div>

  <!-- Grid pills -->
  <div class="grid-pills" id="gridPills">
    <div class="pill" data-n="3">3×3</div>
    <div class="pill" data-n="4">4×4</div>
    <div class="pill" data-n="5">5×5</div>
  </div>

  <!-- Photo tools (visible only in photo mode) -->
  <div class="photo-tools" id="photoTools" style="display:none">
    <label class="btn-mini">
      <input type="file" accept="image/*" id="fileInput" hidden>
      <span id="uploadIcon"></span> Upload Photo
    </label>
    <button class="btn-mini" id="numToggle"><span id="eyeIcon"></span> <span id="numLabel">Numbers</span></button>
  </div>

  <!-- Live preview -->
  <div class="preview-wrap" id="previewWrap"></div>

  <!-- Resume card -->
  <div class="resume-card" id="resumeCard" style="display:none">
    <div class="txt">
      <div class="lbl">Resume</div>
      <div class="val" id="resumeVal">3×3 • Classic</div>
    </div>
    <div class="play" id="resumePlay"></div>
  </div>

  <!-- Play button -->
  <button class="action-btn" id="btnPlay">Play</button>
</div>

<!-- Panels -->
<div class="overlay" id="overlay"></div>
<aside class="panel left" id="panelLeft">
  <h2>Information</h2>
  <div class="row" data-doc="about"><span>About</span><span id="i1"></span></div>
  <div class="row" data-doc="guide"><span>Guide</span><span id="i2"></span></div>
  <div class="row" data-doc="policy"><span>Privacy Policy</span><span id="i3"></span></div>
  <div class="row" id="rowInstall"><span>Install App</span><span id="i4"></span></div>
  <div class="row" id="rowShare"><span>Share</span><span id="i5"></span></div>
  <div class="row" id="rowTheme"><span>Theme</span><span id="thVal">Auto</span></div>
  <div class="row" id="rowMusic"><span>Music</span><span class="switch" id="swMusic"></span></div>
  <div class="row" id="rowSound"><span>Sound</span><span class="switch" id="swSound"></span></div>
  <div class="row" id="rowVib"><span>Vibration</span><span class="switch" id="swVib"></span></div>
  <div class="row" id="rowReset"><span>Reset Statistics</span><span id="i6"></span></div>
  <div class="row" style="justify-content:center;opacity:.6"><span>Made with ♥</span></div>
</aside>

<aside class="panel right" id="panelRight">
  <h2>Dashboard</h2>
  <div class="stat-grid" id="statGrid"></div>
  <h3 style="margin:14px 0 8px;font-size:15px;opacity:.8">Per Grid Records</h3>
  <div id="gridRecords"></div>
  <h3 style="margin:14px 0 8px;font-size:15px;opacity:.8">Achievements</h3>
  <div id="achList"></div>
</aside>

<!-- Doc iframe modal -->
<div class="iframe-modal" id="docModal"><iframe id="docFrame" src="about:blank"></iframe></div>

<script src="storage.js"></script>
<script src="ui.js"></script>
<script src="game.js"></script>
<script src="preview.js"></script>
<script src="script.js"></script>
<script>
/* Register the service worker for offline play + auto-apply updates */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").then((reg) => {
      // When a new SW takes control, reload once to pick up fresh assets
      let reloaded = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloaded) return; reloaded = true; location.reload();
      });
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("SKIP_WAITING");
          }
        });
      });
      // Poll for updates hourly while the tab is open
      setInterval(() => reg.update().catch(() => {}), 60 * 60 * 1000);
    }).catch(() => {});
  });
}
</script>
</body>
</html>
